---
# yaml-language-server: $schema=https://kubernetes-schemas.devbu.io/helmrelease_v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: velero
  namespace: velero
spec:
  interval: 15m
  chart:
    spec:
      chart: velero
      sourceRef:
        kind: HelmRepository
        name: vmware-tanzu
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    initContainers:
      - name: velero-plugin-for-aws
        image: velero/velero-plugin-for-aws:v1.4.0
        imagePullPolicy: IfNotPresent
        volumeMounts:
          - mountPath: /target
            name: plugins

    defaultVolumesToFsBackup: true
    deployNodeAgent: true

    credentials:
      existingSecret: velero-secret

    configuration:
      provider: aws
      backupStorageLocation:
        name: backblaze
        provider: aws
        bucket: mdegouw-velero-test
        default: true
        prefix: velero
        config:
          region: us-west-004
          s3ForcePathStyle: true
          s3Url: https://s3.us-west-004.backblazeb2.com

    kubectl:
      image:
        repository: docker.io/sebastiangaiser/kubectl
        digest: sha256:30ab381fa9636d9dee7dccaf734d5f0400840448b6dc35b7497f560f27d7a4ec
