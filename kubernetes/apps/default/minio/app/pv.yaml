---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: minio-nfs
spec:
  capacity:
    storage: 1Mi
  accessModes:
    - ReadWriteMany
  storageClassName: minio-nfs
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: "192.168.178.240"
    path: /volume1/minio
  mountOptions:
    - nfsvers=4
    - nconnect=8
    - hard
    - noatime
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-config
  namespace: default
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: freenas-iscsi-csi
  resources:
    requests:
      storage: 1Mi
